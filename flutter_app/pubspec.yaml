name: reliefnet_app
description: ReliefNet — Humanitarian platform for disaster relief in Pakistan
publish_to: "none"
version: 2.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Persistence
  drift: ^2.20.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.25

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.3.0

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # UI
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  # intl: ^0.19.0
  lottie: ^3.1.2

  # Forms
  flutter_form_builder: ^10.0.1
  form_builder_validators: ^11.0.0

  # Images
  image_picker: ^1.1.2

  # Location
  geolocator: ^13.0.1

  # Payments
  flutter_stripe: ^10.2.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Time
  timeago: ^3.7.0

  # Links
  url_launcher: ^6.3.1

  # Real-time
  socket_io_client: ^2.0.3+1

  # Utilities
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  equatable: ^2.0.5
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  drift_dev: ^2.20.0
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.13.1      # ✅ ADDED
  flutter_native_splash: ^2.4.3

flutter_native_splash:
  color: "#1A56DB"
  image: assets/images/app_icon.png
  color_dark: "#0F3A8A"
  image_dark: assets/images/app_icon.png
  android_12:
    image: assets/images/app_icon.png
    icon_background_color: "#1A56DB"
    image_dark: assets/images/app_icon.png
    icon_background_color_dark: "#0F3A8A"
  web: false

flutter_launcher_icons:          # ✅ change from flutter_icons
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#1565C0"
  adaptive_icon_foreground: "assets/images/app_icon.png"

flutter:
  uses-material-design: true

  assets:                               # ✅ ADDED
    - assets/images/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700