name: DisasterAid CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  FLUTTER_VERSION: '3.22.0'

jobs:
  # ── Backend Tests ──
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: disasteraid_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test_user -d disasteraid_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Initialize test database
        run: psql -h localhost -U test_user -d disasteraid_test -f database/001_init.sql
        env:
          PGPASSWORD: test_password

      - name: Run tests with coverage
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: disasteraid_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          JWT_SECRET: test_jwt_secret_that_is_at_least_32_chars_long
          BCRYPT_ROUNDS: 4

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # ── Flutter Tests ──
  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Run tests
        working-directory: flutter_app
        run: flutter test --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: flutter-coverage
          path: flutter_app/coverage/

  # ── Build ──
  build:
    name: Build & Containerize
    runs-on: ubuntu-latest
    needs: [backend-test, flutter-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t disasteraid-api:${{ github.sha }} ./backend

      - name: Build admin-panel Docker image
        run: docker build -t disasteraid-admin:${{ github.sha }} ./admin-panel

      - name: Build flutter-web Docker image
        run: docker build -t disasteraid-web:${{ github.sha }} ./flutter_app -f ./flutter_app/Dockerfile.web

      - name: Build verification
        run: echo "Build successful for all components at commit ${{ github.sha }}"
